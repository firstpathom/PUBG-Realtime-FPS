<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Scoreboard - Control Panel</title>
    <style>
        :root {
            --bg-page: #0f1015;
            --bg-panel: #181920;
            --bg-input: #23252f;
            --border-color: #313340;
            --border-hover: #52556a;
            --accent: #f59600;
            --accent-hover: #ffaa22;
            --text-main: #f0f0f5;
            --text-muted: #9ba0b4;
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        @font-face {
            font-family: 'TransducerCondensed';
            src: url('transducer-condensedbold.otf') format('opentype');
            font-weight: normal; 
            font-style: normal;
        }

        * {
            font-family: 'TransducerCondensed', 'Segoe UI', Tahoma, sans-serif !important;
            letter-spacing: 0.3px;
            box-sizing: border-box;
            font-weight: 400 !important; 
            -webkit-font-smoothing: antialiased; 
        }

        body { 
            margin: 0; 
            padding: 40px 20px; 
            background-color: var(--bg-page); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            color: var(--text-main);
        }

        #setup-panel {
            background-color: var(--bg-panel); 
            padding: 35px; 
            border-radius: var(--radius-lg); 
            width: 900px;
            border: 1px solid var(--border-color); 
            box-shadow: 0px 20px 40px rgba(0,0,0,0.4);
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 45px;
        }

        h3 { 
            margin: 0 0 20px 0; 
            font-size: 22px; 
            color: var(--accent); 
            text-transform: uppercase; 
            padding-bottom: 10px; 
            border-bottom: 2px solid rgba(245, 150, 0, 0.2);
        }
        
        label { 
            display: block; 
            font-size: 17px; 
            margin-bottom: 6px; 
            color: var(--text-muted);
        }

        input[type="text"], input[type="number"] {
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 25px; 
            background-color: var(--bg-input); 
            border: 1px solid var(--border-color); 
            color: var(--text-main); 
            border-radius: var(--radius-sm); 
            font-size: 18px; 
            transition: all 0.2s ease;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(245, 150, 0, 0.15);
        }
        
        input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        
        .opacity-value-display {
            font-size: 14px;
            color: var(--accent);
            text-align: right;
            margin-bottom: 25px;
            font-family: monospace !important;
        }

        .color-group-title {
            font-size: 16px; 
            color: #b0b5c9;
            margin: 15px 0 10px 0;
            padding-bottom: 6px;
            border-bottom: 1px dashed var(--border-color);
            text-transform: uppercase;
        }

        .color-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 10px; 
        }
        .color-item { 
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between;
            transition: border-color 0.2s;
        }
        .color-item:hover { border-color: var(--border-hover); }
        .color-item label { margin: 0; font-size: 16px; color: var(--text-main); } 
        .color-item input[type="color"] { 
            width: 32px; 
            height: 32px; 
            border: none; 
            padding: 0; 
            cursor: pointer; 
            background: none; 
            border-radius: 4px; 
            margin-bottom: 0;
        }
        .color-item input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .color-item input[type="color"]::-webkit-color-swatch { 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
        }

        .checkbox-group { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 20px; 
            background-color: var(--bg-input); 
            padding: 14px 16px; 
            border-radius: var(--radius-sm); 
            border: 1px solid var(--border-color); 
            transition: border-color 0.2s;
        }
        .checkbox-group:hover { border-color: var(--border-hover); }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; accent-color: var(--accent); }
        .checkbox-group label { color: var(--text-main); font-size: 17px; cursor: pointer; margin: 0; } 

        .result-box { 
            background-color: #0b0c10; 
            padding: 20px; 
            border-radius: var(--radius-md); 
            border: 1px solid #4a3311; 
            margin-top: 15px; 
        }
        .result-box label { color: var(--accent); font-size: 17px; display: block; margin-bottom: 10px; } 
        .result-box input { 
            width: 100%; 
            margin-bottom: 15px; 
            background-color: rgba(0,0,0,0.5); 
            border: 1px solid var(--border-color); 
            color: #00ffcc; 
            font-family: 'Courier New', monospace !important; 
            font-size: 16px; 
            padding: 14px;
        }

        .btn-group { display: flex; gap: 12px; }
        button {
            flex: 1; 
            padding: 14px; 
            border: none; 
            border-radius: var(--radius-sm); 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 18px; 
            transition: all 0.2s; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        #btn-copy { background-color: #313340; color: #fff; }
        #btn-copy:hover { background-color: #434657; transform: translateY(-1px); }
        #btn-open { background-color: var(--accent); color: #fff; }
        #btn-open:hover { background-color: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245, 150, 0, 0.3); }
        
        .btn-small { padding: 12px; font-size: 16px; } 
        #btn-save { background-color: #27ae60; color: #fff; }
        #btn-save:hover { background-color: #2ecc71; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2); }
        #btn-reset { background-color: transparent; color: #e74c3c; border: 1px solid #e74c3c; }
        #btn-reset:hover { background-color: rgba(231, 76, 60, 0.1); }

        @media (max-width: 800px) {
            #setup-panel { grid-template-columns: 1fr; width: 100%; max-width: 500px; gap: 30px; padding: 25px; }
        }
    </style>
</head>
<body>

    <div id="setup-panel">
        <div class="panel-col">
            <h3>1. API CONFIGURATION</h3>
            <label>Tournament ID:</label>
            <input type="text" id="input-tourney-id" value="" placeholder="e.g., kr-pws1ws1">

            <h3>2. THEME COLORS</h3>
            
            <div class="color-group-title">Background Opacity</div>
            <label>Overlay Background Transparency:</label>
            <input type="range" id="input-opacity" min="0.1" max="1.0" step="0.05" value="1.0">
            <div class="opacity-value-display" id="opacity-display">100%</div>
            
            <div class="color-group-title">Header & Team Style</div>
            <div class="color-grid">
                <div class="color-item"><label>Header BG</label><input type="color" id="bg" value="#f59600"></div>
                <div class="color-item"><label>Header Text</label><input type="color" id="ht" value="#ffffff"></div>
                <div class="color-item"><label>Alive Team BG</label><input type="color" id="tba" value="#ffffff"></div>
                <div class="color-item"><label>Alive Team Text</label><input type="color" id="tta" value="#000000"></div>
                <div class="color-item"><label>Dead Team BG</label><input type="color" id="tbd" value="#222222"></div>
                <div class="color-item"><label>Dead Team Text</label><input type="color" id="ttd" value="#7a7a7a"></div>
            </div>

            <div class="color-group-title">Status Tick (ALIVE Col)</div>
            <div class="color-grid">
                <div class="color-item"><label>Alive Tick</label><input type="color" id="tca" value="#ffffff"></div>
                <div class="color-item"><label>Knocked Tick</label><input type="color" id="tck" value="#ff0000"></div>
            </div>

            <div class="color-group-title">Player Health (TOP 4)</div>
            <div class="color-grid">
                <div class="color-item"><label>Alive HP Bar</label><input type="color" id="hpa" value="#2ecc71"></div>
                <div class="color-item"><label>Knocked HP Bar</label><input type="color" id="hpk" value="#ff0000"></div>
            </div>

            <div class="color-group-title">Elimination Notice</div>
            <div class="color-grid" style="margin-bottom: 25px;">
                <div class="color-item"><label>Eliminated BG</label><input type="color" id="ebg" value="#007bff"></div>
                <div class="color-item"><label>Eliminated Text</label><input type="color" id="etx" value="#ffffff"></div>
            </div>
            
            <div class="btn-group" style="margin-bottom: 10px;">
                <button id="btn-save" class="btn-small" onclick="saveSettings()">💾 SAVE SETTINGS</button>
                <button id="btn-reset" class="btn-small" onclick="resetSettings()">🔄 RESET</button>
            </div>
        </div>

        <div class="panel-col">
            <h3>3. BANNER SETTINGS</h3>
            <div class="checkbox-group">
                <input type="checkbox" id="check-use-gif" checked>
                <label for="check-use-gif">Use Custom ELIMINATED.gif</label>
            </div>
            <div>
                <label>Banner/GIF Duration (Seconds):</label>
                <input type="number" id="input-gif-duration" value="2.0" step="0.1">
            </div>

            <div class="result-box" style="margin-top: 15px;">
                <label>🔴 LIVE URL (For Real Match):</label>
                <input type="text" id="generated-url" readonly>
                <div class="btn-group">
                    <button id="btn-copy" onclick="copyLink('generated-url')">📋 COPY URL</button>
                    <button id="btn-open" onclick="openLink('generated-url')">OPEN LIVE ↗</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultSettings = {
            'bg': '#f59600', 'ht': '#ffffff', 'tba': '#ffffff', 'tta': '#000000',
            'tbd': '#222222', 'ttd': '#7a7a7a', 'tca': '#ffffff', 'tck': '#ff0000',
            'hpa': '#2ecc71', 'hpk': '#ff0000', 'ebg': '#007bff', 'etx': '#ffffff', 
            'input-tourney-id': 'kr-pws1ws1', 'input-gif-duration': '2.0', 'input-opacity': '1.0'
        };

        function loadSettings() {
            for (let key in defaultSettings) {
                if (localStorage.getItem('pubg_sb_' + key) !== null) {
                    document.getElementById(key).value = localStorage.getItem('pubg_sb_' + key);
                } else {
                    document.getElementById(key).value = defaultSettings[key];
                }
            }
            if (localStorage.getItem('pubg_sb_check-use-gif') !== null) {
                document.getElementById('check-use-gif').checked = localStorage.getItem('pubg_sb_check-use-gif') === 'true';
            }
            updateOpacityDisplay();
            updateLink();
        }

        function saveSettings() {
            for (let key in defaultSettings) {
                localStorage.setItem('pubg_sb_' + key, document.getElementById(key).value);
            }
            localStorage.setItem('pubg_sb_check-use-gif', document.getElementById('check-use-gif').checked);
            alert("✅ Settings saved! These colors will load automatically next time.");
        }

        function resetSettings() {
            if(!confirm("⚠️ Are you sure you want to reset all colors to default?")) return;
            
            for (let key in defaultSettings) {
                document.getElementById(key).value = defaultSettings[key];
                localStorage.removeItem('pubg_sb_' + key);
            }
            document.getElementById('check-use-gif').checked = true;
            localStorage.removeItem('pubg_sb_check-use-gif');
            
            updateOpacityDisplay();
            updateLink();
        }

        function updateOpacityDisplay() {
            const opcVal = document.getElementById('input-opacity').value;
            document.getElementById('opacity-display').innerText = Math.round(opcVal * 100) + '%';
        }

        function updateLink() {
            const tourney = document.getElementById('input-tourney-id').value.trim() || '';
            const bg = document.getElementById('bg').value.replace('#', '');
            const ht = document.getElementById('ht').value.replace('#', '');
            const tba = document.getElementById('tba').value.replace('#', '');
            const tta = document.getElementById('tta').value.replace('#', '');
            const tbd = document.getElementById('tbd').value.replace('#', '');
            const ttd = document.getElementById('ttd').value.replace('#', '');
            const tca = document.getElementById('tca').value.replace('#', '');
            const tck = document.getElementById('tck').value.replace('#', '');
            const hpa = document.getElementById('hpa').value.replace('#', '');
            const hpk = document.getElementById('hpk').value.replace('#', '');
            const ebg = document.getElementById('ebg').value.replace('#', '');
            const etx = document.getElementById('etx').value.replace('#', '');
            const gif = document.getElementById('check-use-gif').checked;
            const dur = document.getElementById('input-gif-duration').value;
            const opc = document.getElementById('input-opacity').value;

            let currentUrl = window.location.href.split('?')[0];
            if (currentUrl.endsWith('index.html')) currentUrl = currentUrl.replace('index.html', '');
            if (!currentUrl.endsWith('/')) currentUrl += '/';
            
            const params = `bg=${bg}&ht=${ht}&tba=${tba}&tta=${tta}&tbd=${tbd}&ttd=${ttd}&tca=${tca}&tck=${tck}&hpa=${hpa}&hpk=${hpk}&ebg=${ebg}&etx=${etx}&gif=${gif}&dur=${dur}&opc=${opc}`;
            
            document.getElementById('generated-url').value = `${currentUrl}overlay.html?tourney=${tourney}&${params}`;
        }

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => input.addEventListener('input', () => {
            if (input.id === 'input-opacity') updateOpacityDisplay();
            updateLink();
        }));
        inputs.forEach(input => input.addEventListener('change', updateLink));

        function copyLink(inputId) {
            if(document.getElementById('input-tourney-id').value.trim() === "") {
                alert("Please enter a Tournament ID for the Live URL."); 
                document.getElementById('input-tourney-id').focus();
                return;
            }
            const copyText = document.getElementById(inputId);
            copyText.select();
            document.execCommand("copy");
            
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "✅ COPIED!";
            setTimeout(() => { btn.innerHTML = originalText; }, 1500);
        }

        function openLink(inputId) {
            const url = document.getElementById(inputId).value;
            if(document.getElementById('input-tourney-id').value.trim() === "") {
                alert("Please enter a Tournament ID."); 
                document.getElementById('input-tourney-id').focus();
                return;
            }
            window.open(url, '_blank');
        }

        window.onload = loadSettings;

    </script>
</body>
</html>
