<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Scoreboard - Advanced OBS Overlay</title>
    <style>
        :root {
            /* สีพื้นฐาน (รับค่าจาก URL ได้) */
            --c-header-bg: #f59600; --c-header-text: #ffffff;
            --c-team-bg-alive: #ffffff; --c-team-text-alive: #000000;
            --c-team-bg-dead: #222222; --c-team-text-dead: #7a7a7a;
            --c-hp-alive: #2ecc71; --c-hp-knocked: #ff0000;
            --c-elim-bg: #ccee00; --c-elim-text: #111111;
            --c-tick-alive: #ffffff; --c-tick-knocked: #ff0000;
            --gif-duration: 4s; 
            --c-team-opacity: 1.0; 
        }

        @font-face {
            font-family: 'TransducerCondensed';
            src: url('transducer-condensedbold.otf') format('opentype');
            font-weight: normal; font-style: normal;
        }

        /* 🟢 GPU acceleration */
        * {
            font-family: 'TransducerCondensed', sans-serif !important;
            letter-spacing: 0.5px;
            font-weight: normal !important; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
            backface-visibility: hidden;
            perspective: 1000px;
        }

        body { margin: 0; padding: 20px; background-color: transparent; }

        .scoreboard-container { display: flex; flex-direction: column; width: 260px; position: relative; border-radius: 0px !important; overflow: visible !important; }
        #scoreboard { display: flex; flex-direction: column; width: 100%; position: relative; overflow: visible !important; }
        
        .header-row { height: 28px; position: relative; z-index: 20; background-color: var(--c-header-bg); color: var(--c-header-text); border-radius: 0px !important; }
        .row-grid { display: grid; grid-template-columns: 24px minmax(0, 1fr) 42px 30px 38px; align-items: center; box-sizing: border-box; padding: 0 4px; position: relative; z-index: 5; }
        
        /* 60fps Optimization + Broadcast Easing */
        .team-wrapper { 
            position: relative; 
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); 
            z-index: 1; 
            overflow: visible !important; 
            will-change: transform;
            transform: translateZ(0); 
        }
        .team-wrapper.is-moving { z-index: 10; }
        
        /* 🟢 ห้ามใช้ display: none ตอน animation */
        .team-wrapper.hidden-top4 { 
            opacity: 0;
            transform: scale(0.95) translateZ(0);
            pointer-events: none;
            visibility: hidden;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden;
            transition: opacity 0.3s ease, transform 0.3s ease, height 0.3s ease;
        }

        .team-row-inner {
            text-transform: uppercase; position: relative; 
            transition: max-height 0.4s ease, opacity 0.4s ease;
            z-index: 2; color: var(--c-team-text-alive);
            border-radius: 0px !important;
            will-change: max-height, opacity;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background-color: var(--c-team-bg-alive);
            opacity: var(--c-team-opacity); 
            transition: background-color 0.4s ease, opacity 0.4s ease;
            will-change: background-color, opacity;
        }

        .team-row-inner .row-grid { height: 32px; }
        .team-row-inner.expanded .row-grid { border-bottom: 1px solid rgba(128, 128, 128, 0.3); margin-bottom: 5px; }
        .team-row-inner.collapsed { max-height: 32px; padding-bottom: 0; overflow: hidden; }
        .team-row-inner.expanded { max-height: 250px; padding-bottom: 8px; overflow: hidden; }
        
        .team-row-inner.first-place { border-bottom: 1px solid #bfbfbf; }
        .team-row-inner.normal-place { border-bottom: 1px solid #bfbfbf; }
        
        .team-row-inner.eliminated-team .bg-layer { background-color: var(--c-team-bg-dead) !important; }
        .team-row-inner.eliminated-team { color: var(--c-team-text-dead) !important; }

        @keyframes bluechip-glow { 
            0% { filter: brightness(1); } 
            50% { filter: brightness(1.2); } 
            100% { filter: brightness(1); } 
        }
        
        .blue-chip-panel {
            position: absolute;
            right: -38px; 
            top: 0;
            width: 38px; 
            height: 32px; 
            background-color: #225b82; 
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1; 
            opacity: 0;
            transform: translate3d(-100%, 0, 0) scale(0.95); 
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.3s ease;
            will-change: transform, opacity;
        }

        .blue-chip-panel.active {
            opacity: 1;
            transform: translate3d(0, 0, 0) scale(1); 
            animation: bluechip-glow 1.5s infinite ease-in-out;
        }

        .blue-chip-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 3px;
            box-sizing: border-box;
        }

        .col-rank, .col-team, .col-alive, .col-pts, .col-kills { display: flex; align-items: center; height: 100%; line-height: 1; }
        .col-rank { justify-content: center; font-size: 16px; }
        .col-team { justify-content: flex-start; padding-left: 4px; }
        .header-row .col-team { padding-left: 28px; } 

        .col-alive { justify-content: center; gap: 2px; transform: translateX(-2px); }
        .col-pts, .col-kills { justify-content: center; font-size: 18px; }

        .header-row .col-rank, .header-row .col-team, .header-row .col-alive, .header-row .col-pts, .header-row .col-kills { font-size: 14px; letter-spacing: 0px; }
        .header-row .col-alive { transform: translateX(-2px); }
        .header-row .col-pts, .header-row .col-kills { transform: translateX(0); }

        .team-logo { width: 28px; height: 28px; margin-right: 8px; object-fit: contain; background-color: transparent; flex-shrink: 0; transform: translateZ(0); }
        .team-name { font-size: 20px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; }

        /* 🟢 เปลี่ยน HP เป็น transform scaleY */
        .alive-bar { position: relative; width: 6px; height: 18px; border-radius: 1px; border: 1px solid #000000; box-sizing: border-box; background-color: #111111; overflow: hidden; transform: translateZ(0); }
        .hp-fill-small { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            height: 100%;
            transform-origin: bottom;
            transform: scaleY(1);
            transition: transform 0.4s ease-out, background-color 0.4s;
            will-change: transform, background-color;
        }

        .player-list { padding: 2px 8px 6px 34px; display: flex; flex-direction: column; gap: 5px; }
        .player-item { display: grid; grid-template-columns: 1fr 110px; align-items: center; gap: 10px; }
        .player-name { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--c-team-text-alive); }
        .player-name.dead { color: var(--c-team-text-dead); opacity: 0.7; }
        
        /* 🟢 Player HP bar ใช้ scaleX */
        .player-hp-bar { height: 10px; background-color: #444; border: 1px solid #000; position: relative; overflow: hidden; transform: translateZ(0); }
        .player-hp-fill { 
            height: 100%; 
            width: 100%;
            transform-origin: left;
            transform: scaleX(1);
            transition: transform 0.4s ease-out, background-color 0.4s;
            will-change: transform, background-color;
        }

        .data-layer { position: relative; z-index: 5; width: 100%; }
        .banner-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; overflow: hidden;}

        @keyframes slide-pause-out-banner { 
            0% { transform: translate3d(-105%, 0, 0); opacity: 1; } 
            15% { transform: translate3d(0, 0, 0); opacity: 1; } 
            75% { transform: translate3d(0, 0, 0); opacity: 1; } 
            95% { transform: translate3d(105%, 0, 0); opacity: 1; } 
            100% { transform: translate3d(105%, 0, 0); opacity: 0; } 
        }

        @keyframes slide-in-pause-out-gif { 
            0% { transform: translate3d(-105%, 0, 0); opacity: 1; } 
            15% { transform: translate3d(0, 0, 0); opacity: 1; } 
            85% { transform: translate3d(0, 0, 0); opacity: 1; } 
            99% { transform: translate3d(105%, 0, 0); opacity: 1; } 
            100% { transform: translate3d(105%, 0, 0); opacity: 0; } 
        }
        
        .eliminated-banner.default-mode { 
            position: absolute; top: 0; left: 0; width: 100%; height: 32px; 
            background-color: var(--c-elim-bg); color: var(--c-elim-text); 
            display: flex; align-items: center; justify-content: center; font-size: 18px; transform: translateX(-105%); 
            animation: slide-pause-out-banner var(--gif-duration) ease-in-out forwards;
            will-change: transform;
        }

        .eliminated-banner.gif-mode { 
            position: absolute; top: 0; left: 0; width: 100%; height: 32px; 
            background-size: cover; background-position: center; background-color: transparent; 
            display: flex; align-items: center; justify-content: center; transform: translateX(-105%); 
            animation: slide-in-pause-out-gif var(--gif-duration) ease-in-out forwards;
            will-change: transform;
        }
        
        .revived-banner { 
            position: absolute; top: 0; left: 0; width: 100%; height: 32px; 
            background-image: url('REVIVED.png'); background-size: cover; background-position: center;
            color: #ffffff; 
            display: flex; align-items: center; justify-content: center; font-size: 17px; transform: translateX(-105%); 
            animation: slide-pause-out-banner 4s ease-in-out forwards;
            will-change: transform;
        }
        
        /* 🟢 CSS Animation สำหรับ Bluezone (ทำงานพร้อมกันผ่าน Global JS) */
        .team-row-inner.in-bluezone .bg-layer::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 32px; 
            background-color: rgba(0, 150, 255, 0);
            transition: background-color 0.75s ease-in-out;
            z-index: 1; 
            pointer-events: none; 
        }

        /* เมื่อ JS เติม Class นี้ จะทำให้พื้นหลังเป็นสีฟ้า (กระพริบ) */
        .scoreboard-container.global-bluezone-flash .team-row-inner.in-bluezone .bg-layer::after {
            background-color: rgba(0, 150, 255, 0.4);
        }

        @keyframes pulse-knocked {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .knocked-pulse {
            animation: pulse-knocked 1.5s infinite ease-in-out;
            will-change: opacity;
        }
        
        #error-msg { color: #f59600; font-size: 14px; background: #222; padding: 15px; border: 1px solid #f59600; display: none; }
    </style>
</head>
<body>

    <div id="error-msg">กรุณาระบุ Tournament ID ผ่านการเจนลิงก์จากหน้า Control Panel (index.html) ก่อนนำมาใส่ใน OBS ครับ</div>

    <div id="main-scoreboard" style="display: none;">
        <div class="scoreboard-container" id="main-container">
            <div class="row-grid header-row">
                <div class="col-rank">#</div><div class="col-team">TEAM</div><div class="col-alive">ALIVE</div><div class="col-pts">PTS</div><div class="col-kills">KILLS</div>
            </div>
            <div id="scoreboard"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tourneyId = urlParams.get('tourney');

        let API_URL = "";
        const LOCAL_LOGO_PATH = "http://localhost/Keng/"; 
        let useGifMode = true; 
        let gifDuration = 4.0; 

        let currentTeamsEliminated = {}; 
        let playerStates = {}; 
        let teamEliminatedTime = {}; 
        
        let finalTop4 = []; 
        let isTop4Locked = false; 
        let top4EliminationOrder = []; 
        
        let isFirstRender = true;
        let top4EntryTime = 0; 
        let latestData = null;
        let previousAliveCount = 0; 
        
        let teamBluechipCounts = {};
        // 🟢 เก็บสถานะ ว่ามีคนกำลังรอฟื้นไหม (true/false) 
        let isWaitingForRevive = {}; 
        let matchEndTime = 0;

        // โหลด State ของ Top4 จาก localStorage
        try {
            const savedTop4 = JSON.parse(localStorage.getItem(`pubg_finalTop4_${tourneyId || 'default'}`) || "[]");
            const savedOrder = JSON.parse(localStorage.getItem(`pubg_top4Order_${tourneyId || 'default'}`) || "[]");
            if (savedTop4.length > 0) {
                finalTop4 = savedTop4;
                isTop4Locked = true;
                top4EliminationOrder = savedOrder;
            }
        } catch(e) {}

        // 🟢 ระบบควบคุมแอนิเมชัน Bluezone ให้กระพริบพร้อมกันทั้งจอ (Global Sync)
        setInterval(() => {
            const container = document.getElementById('main-container');
            if(container) {
                container.classList.toggle('global-bluezone-flash');
            }
        }, 750); 

        function renderScoreboard(data) {
            if (!data || !data.data || !data.data.teams) return;
            latestData = data; 
            const now = Date.now();

            const aliveTeamsCountCheck = data.data.teams.filter(t => t.elimination === false || (t.players && t.players.some(p => p.isAlive))).length;
            
            // ตรวจจับการเริ่มแมตช์ใหม่
            let isMatchReset = false;
            if (isFirstRender || (previousAliveCount < 10 && aliveTeamsCountCheck >= 14)) {
                isMatchReset = true;
            }
            previousAliveCount = aliveTeamsCountCheck;

            // ล้างประวัติเกมส์เมื่อขึ้นแมตช์ใหม่
            if (isMatchReset) {
                matchEndTime = 0;
                top4EntryTime = 0;
                teamBluechipCounts = {};
                isWaitingForRevive = {}; // เคลียร์สถานะการรอชุบ
                
                currentTeamsEliminated = {}; 
                playerStates = {}; 
                teamEliminatedTime = {};
                
                finalTop4 = [];
                top4EliminationOrder = [];
                isTop4Locked = false;
                localStorage.removeItem(`pubg_finalTop4_${tourneyId || 'default'}`);
                localStorage.removeItem(`pubg_top4Order_${tourneyId || 'default'}`);
            }

            const scoreboard = document.getElementById('scoreboard');
            const oldPositions = {};
            scoreboard.querySelectorAll('.team-wrapper').forEach(row => { oldPositions[row.id] = row.getBoundingClientRect().top; });

            const sortedTeams = data.data.teams.sort((a, b) => a.total_pts_rank - b.total_pts_rank);
            const aliveTeams = sortedTeams.filter(t => t.elimination === false || (t.players && t.players.some(p => p.isAlive)));
            const aliveTeamsCount = aliveTeams.length;
            const isMatchEnded = aliveTeamsCount <= 1; 

            if (isMatchEnded) {
                if (matchEndTime === 0 && !isMatchReset) {
                    matchEndTime = now;
                    setTimeout(() => { if (latestData) renderScoreboard(latestData); }, 6500); 
                }
            } else {
                matchEndTime = 0;
            }

            const showFinalStandings = (isMatchEnded && matchEndTime !== 0 && (now - matchEndTime >= 6000));
            const elimDurationMs = gifDuration * 1000;

            if (aliveTeamsCount <= 4 && !isMatchEnded) {
                if (top4EntryTime === 0 && !isMatchReset) {
                    top4EntryTime = now;
                    setTimeout(() => { if (latestData) renderScoreboard(latestData); }, elimDurationMs + 100); 
                }
            }

            const isTop4Period = !isMatchEnded && !showFinalStandings && aliveTeamsCount <= 4 && (isMatchReset || (now - top4EntryTime >= elimDurationMs));

            const matchTop4Teams = data.data.teams.filter(t => t.match_live_rank <= 4).map(t => t.team_name);

            if (aliveTeamsCount <= 4 && !isMatchReset) {
                if (matchTop4Teams.length > 0) {
                    finalTop4 = matchTop4Teams; 
                } else if (!isTop4Locked && aliveTeamsCount > 0) {
                    finalTop4 = aliveTeams.map(t => t.team_name); 
                }
                isTop4Locked = true;
                localStorage.setItem(`pubg_finalTop4_${tourneyId || 'default'}`, JSON.stringify(finalTop4));
            }

            sortedTeams.forEach((team, index) => {
                let wrapperRow = document.getElementById(`team-${team.team_name}`);
                if (!wrapperRow) {
                    wrapperRow = document.createElement('div');
                    wrapperRow.id = `team-${team.team_name}`;
                    wrapperRow.className = 'team-wrapper';
                    
                    wrapperRow.innerHTML = `
                        <div class="blue-chip-panel"><img class="blue-chip-icon" src="BLUECHIP.png" onerror="this.style.display='none'"></div>
                        <div class="team-row-inner">
                            <div class="bg-layer"></div>
                            <div class="banner-layer"></div>
                            <div class="data-layer"><div class="row-grid-wrapper"></div></div>
                        </div>`;
                    scoreboard.appendChild(wrapperRow);
                }
                
                wrapperRow.style.order = index; 
                let innerRow = wrapperRow.querySelector('.team-row-inner');

                let teamIsAlive = false, teamInBlueZone = false, revivedPlayersQueue = [];
                let dotsHtml = '', playerDetailsHtml = ''; 

                // 🌟 1. ดักการ "กดใช้เครื่อง"
                let currentBluechipCount = team.useBluechipCount || team.revive_count || team.bluechip_revive || team.revives || 0;
                
                if (teamBluechipCounts[team.team_name] === undefined) {
                    teamBluechipCounts[team.team_name] = currentBluechipCount;
                }

                if (currentBluechipCount > teamBluechipCounts[team.team_name]) {
                    teamBluechipCounts[team.team_name] = currentBluechipCount;
                    // 🟢 เมื่อมีการกดใช้เครื่อง ให้เซ็ตค่าเป็น true โชว์ค้างไปเลย ไม่มีวันหมดอายุ
                    isWaitingForRevive[team.team_name] = true;
                }

                let safeTeamTag = team.team_tag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                let prefixRegex = new RegExp('^' + safeTeamTag + '[_\\-\\s]?', 'i');

                if (team.players) {
                    let sortedForDots = [...team.players].sort((a, b) => {
                        if (a.isAlive !== b.isAlive) return a.isAlive ? -1 : 1; 
                        return (b.health || 0) - (a.health || 0); 
                    });

                    let sortedForTop4List = [...team.players].sort((a, b) => (a.name || '').localeCompare(b.name || ''));

                    sortedForDots.forEach(p => {
                        let isCurrentlyAlive = (p.isAlive === true || p.isAlive === 1 || p.isAlive === "true");
                        
                        if (isCurrentlyAlive) { 
                            teamIsAlive = true; 
                            if (p.isInBlueZone || p.is_in_bluezone || p.in_bluezone || p.inBlueZone) teamInBlueZone = true; 
                        }

                        let rawName = p.name || '';
                        let cleanName = rawName.replace(prefixRegex, '');

                        // 🎯 2. ตรวจจับการ "เกิดสำเร็จ"
                        if (!isMatchReset && playerStates[rawName] === false && isCurrentlyAlive) {
                            revivedPlayersQueue.push(cleanName);
                        }
                        playerStates[rawName] = isCurrentlyAlive;

                        const pulseS = (isCurrentlyAlive && p.isGroggy) ? 'knocked-pulse' : '';
                        const colorS = isCurrentlyAlive ? (p.isGroggy ? 'var(--c-tick-knocked)' : 'var(--c-tick-alive)') : 'transparent';
                        
                        const hpPercent = isCurrentlyAlive ? (p.isGroggy ? 1 : (typeof p.health === 'number' ? p.health / 100 : 1)) : 0;
                        dotsHtml += `<div class="alive-bar"><div class="hp-fill-small ${pulseS}" style="transform: scaleY(${hpPercent}); background-color:${colorS};"></div></div>`;
                    });

                    sortedForTop4List.forEach(p => {
                        let isCurrentlyAlive = (p.isAlive === true || p.isAlive === 1 || p.isAlive === "true");
                        let rawName = p.name || '';
                        let cleanName = rawName.replace(prefixRegex, '');

                        const pulseL = (isCurrentlyAlive && p.isGroggy) ? 'knocked-pulse' : '';
                        const colorL = isCurrentlyAlive ? (p.isGroggy ? 'var(--c-hp-knocked)' : 'var(--c-hp-alive)') : 'transparent';
                        
                        const hpPercent = isCurrentlyAlive ? (p.isGroggy ? 1 : (typeof p.health === 'number' ? p.health / 100 : 1)) : 0;
                        playerDetailsHtml += `
                            <div class="player-item">
                                <div class="player-name ${isCurrentlyAlive ? '' : 'dead'}">${cleanName}</div>
                                <div class="player-hp-bar"><div class="player-hp-fill ${pulseL}" style="transform: scaleX(${hpPercent}); background-color:${colorL};"></div></div>
                            </div>`;
                    });
                }

                // โชว์ป้ายคนเกิด
                if (revivedPlayersQueue.length > 0 && !isMatchReset) {
                    // 🟢 เมื่อผู้เล่นเกิดแล้ว ให้ยกเลิกการรอชุบ (หด Panel ทันที)
                    isWaitingForRevive[team.team_name] = false;
                    currentTeamsEliminated[team.team_name] = false; 

                    revivedPlayersQueue.forEach((playerName, idx) => {
                        setTimeout(() => {
                            const bannerHtml = document.createElement('div');
                            bannerHtml.className = 'revived-banner animate';
                            bannerHtml.style.backgroundImage = `url('REVIVED.png')`;
                            bannerHtml.innerHTML = `<span style="font-weight:bold; font-size:18px; color:#ffffff;">REVIVED: ${playerName}</span>`;
                            
                            innerRow.querySelector('.banner-layer').appendChild(bannerHtml);
                            setTimeout(() => { bannerHtml.remove(); }, 4050);
                        }, idx * 4200);
                    });
                }

                // 🟢 ควบคุม UI Panel ขวา แบบสถานะรอ
                const bcPanel = wrapperRow.querySelector('.blue-chip-panel');
                if (bcPanel) {
                    // โชว์เมื่อกำลังรอชุบ (isWaitingForRevive เป็น true) และทีมยังไม่ตายหมดตี้
                    if (isWaitingForRevive[team.team_name] && teamIsAlive) {
                        bcPanel.classList.add('active');
                    } else {
                        bcPanel.classList.remove('active');
                    }
                }

                // 🌟 ระบบตรวจจับตายยกตี้ (ELIMINATED) - 🟢 บังคับแสดงผลทันทีเมื่อโหลดหน้าเว็บ
                if (!teamIsAlive && !currentTeamsEliminated[team.team_name]) {
                    currentTeamsEliminated[team.team_name] = true;
                    teamEliminatedTime[team.team_name] = (isFirstRender || isMatchReset) ? 0 : now; 
                    
                    // เผื่อว่ากดชุบไว้แต่ทีมดันมาตายหมดก่อน (ป้ายจะได้หุบเก็บไป ไม่ค้างลอยๆ)
                    isWaitingForRevive[team.team_name] = false;
                    
                    if (finalTop4.includes(team.team_name) && !top4EliminationOrder.includes(team.team_name)) {
                        top4EliminationOrder.push(team.team_name);
                        localStorage.setItem(`pubg_top4Order_${tourneyId || 'default'}`, JSON.stringify(top4EliminationOrder));
                    }

                    // 🟢 โชว์ป้าย ELIMINATED ทันที (ลบเงื่อนไข !isFirstRender ออก เพื่อให้แสดงตอน F5 ด้วย)
                    const cacheBuster = now;
                    const bannerHtml = document.createElement('div');
                    bannerHtml.className = useGifMode ? 'eliminated-banner gif-mode animate' : 'eliminated-banner default-mode animate';
                    
                    if (useGifMode) {
                        bannerHtml.style.backgroundImage = `url('${LOCAL_LOGO_PATH}ELIMINATED.gif?t=${cacheBuster}')`;
                    } else {
                        bannerHtml.innerHTML = `<span style="font-weight:bold;">>> ELIMINATED <<</span>`;
                    }
                    
                    innerRow.querySelector('.banner-layer').appendChild(bannerHtml);
                    setTimeout(() => { bannerHtml.remove(); }, elimDurationMs + 50);
                }

                let expansionClass = 'collapsed', visibilityClass = ''; 
                const timeSinceDeath = now - (teamEliminatedTime[team.team_name] || 0);
                const isTop4Member = finalTop4.includes(team.team_name);

                if (showFinalStandings) {
                    expansionClass = 'collapsed';
                } else if (isMatchEnded) {
                    if (isTop4Member || finalTop4.length === 0) expansionClass = teamIsAlive ? 'expanded' : 'collapsed';
                    else visibilityClass = 'hidden-top4';
                } else if (isTop4Period || isTop4Locked) { 
                    if (!isTop4Member) {
                        visibilityClass = 'hidden-top4';
                    } else {
                        if (teamIsAlive) {
                            expansionClass = 'expanded';
                        } else {
                            const elimIndex = top4EliminationOrder.indexOf(team.team_name);
                            if (elimIndex === -1) {
                                expansionClass = 'expanded';
                            } else {
                                const delay = (elimIndex + 1) * elimDurationMs; 
                                if (now - teamEliminatedTime[team.team_name] > delay && teamEliminatedTime[team.team_name] !== 0) {
                                    expansionClass = 'collapsed';
                                } else {
                                    expansionClass = 'expanded';
                                }
                            }
                        }
                    }
                }

                const themeClass = index === 0 ? 'first-place' : 'normal-place';
                
                // 🟢 กำหนด Class Bluezone ให้ทำงานร่วมกับ Global Sync
                if (teamInBlueZone && teamIsAlive) {
                    if (!innerRow.classList.contains('in-bluezone')) {
                        innerRow.classList.add('in-bluezone');
                    }
                } else {
                    innerRow.classList.remove('in-bluezone');
                }
                
                if(visibilityClass === 'hidden-top4') {
                    wrapperRow.classList.add('hidden-top4');
                } else {
                    wrapperRow.classList.remove('hidden-top4');
                }

                // ควบคุมคลาสอื่นๆ
                innerRow.className = `team-row-inner ${themeClass} ${expansionClass} ${!teamIsAlive ? 'eliminated-team' : ''} ${innerRow.classList.contains('in-bluezone') ? 'in-bluezone' : ''}`;
                
                const rowWrapper = innerRow.querySelector('.row-grid-wrapper');
                
                if (!rowWrapper.querySelector('.row-grid')) {
                    const logoSrc = `${LOCAL_LOGO_PATH}${team.team_tag}.png`; 
                    rowWrapper.innerHTML = `
                        <div class="row-grid">
                            <div class="col-rank">${index + 1}</div>
                            <div class="col-team"><img class="team-logo" src="${logoSrc}" onerror="this.style.visibility='hidden'"><div class="team-name">${team.team_tag}</div></div>
                            <div class="col-alive">${dotsHtml}</div>
                            <div class="col-pts">${team.total_pts_with_penalty}</div>
                            <div class="col-kills">${team.match_kills}</div>
                        </div>
                        <div class="player-list">${playerDetailsHtml}</div>
                    `;
                } else {
                    rowWrapper.querySelector('.col-rank').innerText = index + 1;
                    rowWrapper.querySelector('.col-alive').innerHTML = dotsHtml;
                    rowWrapper.querySelector('.col-pts').innerText = team.total_pts_with_penalty;
                    rowWrapper.querySelector('.col-kills').innerText = team.match_kills;
                    rowWrapper.querySelector('.player-list').innerHTML = playerDetailsHtml;
                }
                
            });

            requestAnimationFrame(() => {
                scoreboard.querySelectorAll('.team-wrapper').forEach(wrapperRow => {
                    const oldTop = oldPositions[wrapperRow.id];
                    if (oldTop !== undefined) {
                        const newTop = wrapperRow.getBoundingClientRect().top;
                        const deltaY = oldTop - newTop;

                        if (deltaY !== 0) {
                            wrapperRow.style.transition = 'none';
                            wrapperRow.style.transform = `translate3d(0, ${deltaY}px, 0)`;
                            wrapperRow.classList.add('is-moving'); 
                            
                            getComputedStyle(wrapperRow).transform;

                            requestAnimationFrame(() => {
                                wrapperRow.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
                                wrapperRow.style.transform = 'translate3d(0, 0, 0)';
                                setTimeout(() => { 
                                    wrapperRow.classList.remove('is-moving'); 
                                    wrapperRow.style.transform = ''; 
                                }, 500);
                            });
                        }
                    }
                });
            });

            isFirstRender = false;
        }

        async function fetchRealTimeData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const apiData = await response.json();
                renderScoreboard(apiData);
            } catch (error) {
                console.error("Error fetching live leaderboard:", error);
            }
        }

        if (!tourneyId) {
            document.getElementById('error-msg').style.display = 'block';
        } else {
            document.getElementById('main-scoreboard').style.display = 'block';

            if(urlParams.has('bg')) document.documentElement.style.setProperty('--c-header-bg', '#' + urlParams.get('bg'));
            if(urlParams.has('ht')) document.documentElement.style.setProperty('--c-header-text', '#' + urlParams.get('ht'));
            if(urlParams.has('tba')) document.documentElement.style.setProperty('--c-team-bg-alive', '#' + urlParams.get('tba'));
            if(urlParams.has('tta')) document.documentElement.style.setProperty('--c-team-text-alive', '#' + urlParams.get('tta'));
            if(urlParams.has('tbd')) document.documentElement.style.setProperty('--c-team-bg-dead', '#' + urlParams.get('tbd'));
            if(urlParams.has('ttd')) document.documentElement.style.setProperty('--c-team-text-dead', '#' + urlParams.get('ttd'));
            if(urlParams.has('tca')) document.documentElement.style.setProperty('--c-tick-alive', '#' + urlParams.get('tca'));
            if(urlParams.has('tck')) document.documentElement.style.setProperty('--c-tick-knocked', '#' + urlParams.get('tck'));
            if(urlParams.has('hpa')) document.documentElement.style.setProperty('--c-hp-alive', '#' + urlParams.get('hpa'));
            if(urlParams.has('hpk')) document.documentElement.style.setProperty('--c-hp-knocked', '#' + urlParams.get('hpk'));
            if(urlParams.has('ebg')) document.documentElement.style.setProperty('--c-elim-bg', '#' + urlParams.get('ebg'));
            if(urlParams.has('etx')) document.documentElement.style.setProperty('--c-elim-text', '#' + urlParams.get('etx'));
            
            if(urlParams.has('opc')) document.documentElement.style.setProperty('--c-team-opacity', urlParams.get('opc'));
            
            if(urlParams.has('gif')) useGifMode = urlParams.get('gif') === 'true';
            
            if(urlParams.has('dur')) {
                gifDuration = parseFloat(urlParams.get('dur')) || 4.0;
                document.documentElement.style.setProperty('--gif-duration', `${gifDuration}s`);
            }

            API_URL = `https://domestic.atum.live/api/pubg/liveleaderboard?account_id=nttapon7799&series=${tourneyId}&tournament_id=${tourneyId}&mode=post&all_teams=true&format=json`;
            fetchRealTimeData();
            setInterval(fetchRealTimeData, 1000); 
        }
    </script>
</body>
</html>
